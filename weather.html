<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Weather</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      padding: 12px;
      margin: 0;
      color: #111;
    }

    h2 {
      margin: 0 0 6px 0;
      font-size: 18px;
    }

    .hour {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 1px 0;
      font-size: 13px;
      line-height: 1.1;
    }

    ul {
      padding-left: 16px;
      margin: 6px 0;
    }

    hr {
      margin: 8px 0;
    }
  </style>
</head>
<body>

<div id="weather">Loading weather...</div>

<script>
const locations = {
  ingleside: { lat: 42.3817, lon: -88.1531, name: "Ingleside, IL" },
  chicago: { lat: 41.8781, lon: -87.6298, name: "Chicago, IL" }
};

const params = new URLSearchParams(window.location.search);
const selected = params.get("city") || "ingleside";
const loc = locations[selected];

function icon(code) {
  if ([0].includes(code)) return "вҳҖпёҸ";
  if ([1,2].includes(code)) return "рҹҢӨпёҸ";
  if ([3].includes(code)) return "вҳҒпёҸ";
  if ([45,48].includes(code)) return "рҹҢ«пёҸ";
  if ([51,53,55,61,63,65].includes(code)) return "рҹҢ§пёҸ";
  if ([71,73,75].includes(code)) return "вқ„пёҸ";
  if ([95,96,99].includes(code)) return "вӣҲпёҸ";
  return "рҹҢЎпёҸ";
}

async function loadWeather() {
  const url =
    `https://api.open-meteo.com/v1/forecast` +
    `?latitude=${loc.lat}&longitude=${loc.lon}` +
    `&current_weather=true` +
    `&hourly=temperature_2m,weathercode` +
    `&daily=temperature_2m_max,temperature_2m_min,weathercode` +
    `&temperature_unit=fahrenheit` +
    `&windspeed_unit=mph` +
    `&timezone=auto`;

  const res = await fetch(url);
  const data = await res.json();

  const current = data.current_weather;
  const hourly = data.hourly;
  const daily = data.daily;

  const hourlyHTML = hourly.time.slice(0, 6).map((t, i) => `
    <div class="hour">
      <span>${new Date(t).getHours()}:00</span>
      <span>${icon(hourly.weathercode[i])}</span>
      <span>${hourly.temperature_2m[i]}В°F</span>
    </div>
  `).join("");

  document.getElementById("weather").innerHTML = `
    <h2>${loc.name}</h2>

    <div style="font-size:26px;font-weight:bold;">
      ${icon(current.weathercode)} ${current.temperature}В°F
    </div>

    <div>рҹ’Ё ${current.windspeed} mph</div>

    <hr>

    <strong>Next 6 Hours</strong>
    ${hourlyHTML}

    <hr>

    <strong>5-Day Forecast</strong>
    <ul>
      ${daily.time.slice(0,5).map((day,i)=>`
        <li>
          ${icon(daily.weathercode[i])}
          ${daily.temperature_2m_min[i]}В° / ${daily.temperature_2m_max[i]}В°
        </li>
      `).join("")}
    </ul>
  `;
}

loadWeather();
</script>

</body>
</html>
