<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Todoist</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <style>
    body {
      margin: 0;
      font-family: system-ui, Arial, sans-serif;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }

    .fallback {
      padding: 20px;
      text-align: center;
    }

    a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

<iframe
  src="https://todoist.com/app/today"
  title="Todoist">
</iframe>

<div class="fallback">
  If Todoist doesn't load here,
  <a href="https://todoist.com/app/today" target="_blank">
    open Todoist directly
  </a>
</div>

</body>
</html>
