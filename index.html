<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Todoist Widget</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
  </head>

  <body>
    <h1>Todoist Upcoming (monthly)</h1>

    <div id="content">Loading tasks…</div>

    <script>
      fetch('/.netlify/functions/todoist-upcoming')
        .then(r => r.text())
        .then(html => {
          document.getElementById('content').innerHTML = html;
        });
    </script>
  </body>
</html>
